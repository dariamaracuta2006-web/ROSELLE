<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>ROSELLE | Galerie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="nav">
    <div class="container navbar">
      <a class="brand" href="index.html">ROSELLE</a>
      <div class="menu">
        <a href="index.html">Acasă</a>
        <a href="despre.html">Despre</a>
        <a href="produse.html">Produse</a>
        <a class="active" href="galerie.html">Galerie</a>
        <a href="contacte.html">Contacte</a>
      </div>
    </div>
  </div>

  <main class="container page">
    <section class="gallery-hero">
      <p class="section-tag">Colecția noastră</p>
      <h1>Galerie ROSELLE</h1>
      <p class="lead">
        Descoperă universul ROSELLE prin imagini care evidențiază delicatețea,
        eleganța și rafinamentul fiecărui produs.
      </p>
    </section>

    <section class="gallery-grid">
      <div class="gallery-item hero">
        <img src="imagini/p1.jpg" class="gallery-photo" alt="Set complet ROSELLE">
      </div>

      <div class="gallery-item large">
        <img src="imagini/p2.jpg" class="gallery-photo" alt="Cremă aplicată pe față">
      </div>

      <div class="gallery-item large">
        <img src="imagini/p3.jpg" class="gallery-photo" alt="Gel aplicat pe mână">
      </div>

      <div class="gallery-item medium">
        <img src="imagini/p4.jpg" class="gallery-photo" alt="Gel care curge">
      </div>

      <div class="gallery-item medium">
        <img src="imagini/p5.jpg" class="gallery-photo" alt="Picături pe gel">
      </div>

      <div class="gallery-item medium">
        <img src="imagini/p6.jpg" class="gallery-photo" alt="Produs artistic ROSELLE">
      </div>

      <div class="gallery-item large">
        <img src="imagini/p7.jpg" class="gallery-photo" alt="Set mic ROSELLE">
      </div>

      <div class="gallery-item large">
        <img src="imagini/p8.jpg" class="gallery-photo" alt="Close-up artistic ROSELLE">
      </div>
    </section>

    <div class="actions">
      <a class="btn" href="produse.html">Vezi produsele</a>
      <a class="btn btn-outline" href="contacte.html">Contactează-ne</a>
    </div>
  </main>

  <footer>© 2026 ROSELLE | Beauty inspired by nature</footer>
</body>
</html>
